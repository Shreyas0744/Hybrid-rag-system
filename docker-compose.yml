version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: documate_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: documate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
